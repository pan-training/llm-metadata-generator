name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask apscheduler requests "openai>=2.0" python-dotenv pytest mypy

      - name: Run tests
        run: pytest tests/ -v

      - name: Run type checks
        run: mypy app tests
